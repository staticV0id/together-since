<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1, user-scalable=no" />
<title>I ♥ mimi </title>
<meta name="description" content="A little love letter that always tells you today's date." />

<!-- PWA -->
<link rel="manifest" href="manifest.json" />
<meta name="theme-color" content="#F1E9DC" />

<!-- iOS PWA support -->
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Today" />
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png" />

<!-- Android / general icons -->
<link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png" />
<link rel="icon" type="image/png" sizes="512x512" href="icons/icon-512.png" />

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,500&family=Playfair+Display:wght@500;600;700&family=Dancing+Script:wght@600;700&display=swap" rel="stylesheet">

<style>
  :root{
    --sand:        #F1E9DC;
    --sand-deep:   #E4D7C0;
    --linen:       #F8F3EA;
    --clay:        #B98A6A;
    --gold:        #AD8850;
    --gold-soft:   #7C5C36;
    --ink:         #3F382E;
    --ink-soft:    #6B6152;
    --line:        rgba(63,56,46,0.14);
  }

  *{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

  html,body{
    height:100%;
    margin:0;
    overscroll-behavior:none;
  }

  body{
    background:
      radial-gradient(120% 90% at 50% -10%, var(--linen) 0%, var(--sand) 55%, var(--sand-deep) 100%);
    color:var(--ink);
    font-family:'Cormorant Garamond', serif;
    display:flex;
    align-items:center;
    justify-content:center;
    min-height:100vh;
    min-height:100dvh;
    padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
    overflow:hidden;
    user-select:none;
    -webkit-user-select:none;
  }

  /* ambient floating hearts, quiet and slow */
  .ambient{
    position:fixed;
    inset:0;
    pointer-events:none;
    z-index:0;
  }
  .ambient span{
    position:absolute;
    bottom:-10%;
    opacity:0;
    color:var(--clay);
    font-size:14px;
    animation: rise linear infinite;
  }
  @keyframes rise{
    0%{ transform:translateY(0) scale(0.8); opacity:0; }
    10%{ opacity:.22; }
    85%{ opacity:.12; }
    100%{ transform:translateY(-115vh) scale(1.1); opacity:0; }
  }

  .stage{
    position:relative;
    z-index:1;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    width:100%;
    max-width:520px;
    padding:32px;
  }

  /* subtle pulsing ring behind the date */
  .locket{
    position:relative;
    display:flex;
    align-items:center;
    justify-content:center;
    width:min(78vw, 340px);
    height:min(78vw, 340px);
    border-radius:50%;
    margin-bottom:8px;
  }

  .pulse-ring{
    position:absolute;
    inset:0;
    border-radius:50%;
    border:1px solid var(--gold);
    opacity:0;
    animation: pulse 2.8s ease-out infinite;
  }
  .pulse-ring.delay{ animation-delay:1.4s; }

  @keyframes pulse{
    0%{ transform:scale(0.86); opacity:.45; }
    70%{ opacity:0; }
    100%{ transform:scale(1.03); opacity:0; }
  }

  .ring-static{
    position:absolute;
    inset:10%;
    border-radius:50%;
    border:1px solid rgba(173,136,80,0.35);
  }

  .content{
    position:relative;
    display:flex;
    flex-direction:column;
    align-items:center;
    text-align:center;
    gap:2px;
  }

  .weekday{
    font-family:'Dancing Script', cursive;
    font-weight:600;
    font-size:clamp(24px, 6vw, 32px);
    color:var(--gold-soft);
    letter-spacing:0.02em;
    margin-bottom:2px;
  }

  .day-number{
    font-family:'Playfair Display', serif;
    font-weight:600;
    font-size:clamp(88px, 26vw, 148px);
    line-height:0.9;
    color:var(--ink);
    text-shadow: none;
  }

  .month-year{
    font-family:'Playfair Display', serif;
    font-weight:500;
    font-style:italic;
    font-size:clamp(20px, 5vw, 26px);
    letter-spacing:0.04em;
    color:var(--ink-soft);
    margin-top:6px;
  }

  .divider{
    display:flex;
    align-items:center;
    gap:10px;
    margin:18px 0 14px;
    color:var(--clay);
  }
  .divider .line{
    width:36px;
    height:1px;
    background:linear-gradient(90deg, transparent, var(--clay));
  }
  .divider .line.right{
    background:linear-gradient(90deg, var(--clay), transparent);
  }
  .divider svg{ width:16px; height:16px; }

  .footnote{
    font-family:'Cormorant Garamond', serif;
    font-style:italic;
    font-size:clamp(14px, 3.6vw, 16px);
    color:rgba(63,56,46,0.55);
    letter-spacing:0.03em;
  }

  .together{
    display:flex;
    align-items:center;
    gap:8px;
    font-family:'Dancing Script', cursive;
    font-weight:600;
    font-size:clamp(18px, 4.6vw, 23px);
    color:var(--gold-soft);
    letter-spacing:0.02em;
    margin-bottom:22px;
    text-align:center;
  }
  .together svg{ width:14px; height:14px; flex:none; opacity:0.85; }

  .counter{
    display:flex;
    align-items:stretch;
    justify-content:center;
    gap:0;
    margin-top:20px;
    padding-top:18px;
    border-top:1px solid rgba(173,136,80,0.25);
    width:100%;
  }
  .counter-time{
    margin-top:12px;
    padding-top:12px;
    border-top:none;
  }
  .counter-time .counter-number{
    font-size:clamp(17px, 4.4vw, 22px);
    color:var(--ink-soft);
    font-variant-numeric:tabular-nums;
  }
  .counter-item{
    flex:1;
    display:flex;
    flex-direction:column;
    align-items:center;
    padding:0 8px;
    position:relative;
  }
  .counter-item + .counter-item::before{
    content:"";
    position:absolute;
    left:0;
    top:8px;
    bottom:8px;
    width:1px;
    background:rgba(173,136,80,0.22);
  }
  .counter-number{
    font-family:'Playfair Display', serif;
    font-weight:600;
    font-size:clamp(22px, 6vw, 30px);
    color:var(--ink);
    line-height:1.1;
  }
  .counter-label{
    font-family:'Cormorant Garamond', serif;
    font-style:italic;
    font-size:clamp(11px, 2.8vw, 13px);
    color:rgba(63,56,46,0.5);
    letter-spacing:0.06em;
    margin-top:2px;
    text-transform:lowercase;
  }

  @media (prefers-reduced-motion: reduce){
    .pulse-ring, .ambient span{ animation:none !important; opacity:0 !important; }
  }

  /* install button */
  .install-btn{
    position:relative;
    z-index:1;
    display:inline-flex;
    align-items:center;
    gap:8px;
    margin-top:22px;
    padding:11px 22px;
    background:rgba(173,136,80,0.08);
    border:1px solid var(--gold);
    border-radius:999px;
    color:var(--gold-soft);
    font-family:'Cormorant Garamond', serif;
    font-style:italic;
    font-size:16px;
    letter-spacing:0.03em;
    cursor:pointer;
    -webkit-appearance:none;
    appearance:none;
    transition:background 0.2s ease, transform 0.15s ease;
  }
  .install-btn svg{ width:15px; height:15px; flex:none; }
  .install-btn:active{ transform:scale(0.97); }
  .install-btn:hover{ background:rgba(173,136,80,0.15); }
  .install-btn.hidden{ display:none; }

  /* iOS instructions sheet */
  .sheet-backdrop{
    position:fixed;
    inset:0;
    background:rgba(63,56,46,0.28);
    backdrop-filter:blur(2px);
    display:none;
    align-items:flex-end;
    justify-content:center;
    z-index:10;
    padding: 0 0 env(safe-area-inset-bottom);
  }
  .sheet-backdrop.visible{ display:flex; }

  .sheet{
    width:100%;
    max-width:480px;
    background:linear-gradient(180deg, var(--linen), var(--sand));
    border:1px solid rgba(173,136,80,0.3);
    border-bottom:none;
    border-radius:20px 20px 0 0;
    padding:24px 24px calc(24px + env(safe-area-inset-bottom));
    text-align:center;
    box-shadow:0 -8px 30px rgba(63,56,46,0.18);
  }
  .sheet h2{
    font-family:'Playfair Display', serif;
    font-weight:600;
    font-style:italic;
    font-size:22px;
    color:var(--ink);
    margin:0 0 12px;
  }
  .sheet p{
    font-family:'Cormorant Garamond', serif;
    font-size:17px;
    color:var(--ink-soft);
    line-height:1.5;
    margin:0 0 6px;
  }
  .sheet .icon-inline{
    display:inline-flex;
    vertical-align:-4px;
    width:18px; height:18px;
    margin:0 2px;
  }
  .sheet .icon-inline svg{ width:100%; height:100%; }
  .sheet button{
    margin-top:18px;
    padding:10px 26px;
    background:transparent;
    border:1px solid var(--gold);
    border-radius:999px;
    color:var(--gold-soft);
    font-family:'Cormorant Garamond', serif;
    font-style:italic;
    font-size:15px;
    cursor:pointer;
  }
</style>
</head>
<body>

  <div class="ambient" id="ambient"></div>

  <main class="stage">
    <div class="together">

      <span>Together since</span>
            <svg viewBox="0 0 24 24" fill="#7C5C36"><path d="M12 21s-6.7-4.6-9.3-8.1C.7 10.1 1.2 6.6 4 4.9 6.2 3.6 9 4.2 12 7.1 15 4.2 17.8 3.6 20 4.9c2.8 1.7 3.3 5.2 1.3 7.9C18.7 16.4 12 21 12 21z"/></svg>
    </div>

    <div class="locket">
            <div class="pulse-ring"></div>
      <div class="pulse-ring delay"></div>
      <div class="ring-static"></div>
      <div class="content">
        <div class="weekday" id="weekday">Friday</div>
        <div class="day-number" id="dayNumber">03</div>
        <div class="month-year" id="monthYear">July 2026</div>
      </div>
    </div>

    <div class="divider">
      <span class="line"></span>
      <svg viewBox="0 0 24 24" fill="#AD8850"><path d="M12 21s-6.7-4.6-9.3-8.1C.7 10.1 1.2 6.6 4 4.9 6.2 3.6 9 4.2 12 7.1 15 4.2 17.8 3.6 20 4.9c2.8 1.7 3.3 5.2 1.3 7.9C18.7 16.4 12 21 12 21z"/></svg>
      <span class="line right"></span>
    </div>

    <div class="footnote" id="footnote">every day is worth marking</div>

    <div class="counter">
      <div class="counter-item">
        <div class="counter-number" id="countYears">0</div>
        <div class="counter-label">years</div>
      </div>
      <div class="counter-item">
        <div class="counter-number" id="countMonths">0</div>
        <div class="counter-label">months</div>
      </div>
      <div class="counter-item">
        <div class="counter-number" id="countWeeks">0</div>
        <div class="counter-label">weeks</div>
      </div>
      <div class="counter-item">
        <div class="counter-number" id="countDays">0</div>
        <div class="counter-label">days</div>
      </div>
    </div>

        <div class="counter counter-time">
      <div class="counter-item">
        <div class="counter-number" id="countHours">00</div>
        <div class="counter-label">hours</div>
      </div>
      <div class="counter-item">
        <div class="counter-number" id="countMinutes">00</div>
        <div class="counter-label">minutes</div>
      </div>
      <div class="counter-item">
        <div class="counter-number" id="countSeconds">00</div>
        <div class="counter-label">seconds</div>
      </div>
    </div>

    <button class="install-btn" id="installBtn" type="button">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 3v12"/><path d="M7 10l5 5 5-5"/><path d="M4 19h16"/>
      </svg>
      <span id="installBtnLabel">Keep it on your home screen</span>
    </button>
  </main>

  <div class="sheet-backdrop" id="installSheetBackdrop">
    <div class="sheet">
      <h2 id="sheetTitle">Add to your home screen</h2>
      <p id="sheetBody">
        Tap the Share icon
        <span class="icon-inline">
          <svg viewBox="0 0 24 24" fill="none" stroke="#7C5C36" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 16V4"/><path d="M8 8l4-4 4 4"/><path d="M5 12v7a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2v-7"/>
          </svg>
        </span>
        in Safari's toolbar, then choose
        <strong>&ldquo;Add to Home Screen.&rdquo;</strong>
      </p>
      <button type="button" id="installSheetClose">Got it</button>
    </div>
  </div>

<script>
  const WEEKDAYS = ["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];
  const MONTHS = ["January","February","March","April","May","June","July","August","September","October","November","December"];

const NOTES = [
  "every day is worth marking",
  "here, and glad of it",
  "one more to remember",
  "quietly, another good one",
  "a small day, kept close",
  "still counting, gladly",
  "another to hold onto",
  "nothing special, and everything",
  "a page turned, gently",
  "today earns its place",
  "here again, still glad",
  "a day like a keepsake",
  "steady, and worth it",
  "one to look back on",
  "small and worth keeping",
  "today, plainly enough",
  "another quiet one to keep"
];

  // "Together since" — anniversary counter
  const TOGETHER_SINCE = new Date(2025, 11, 12); // December 12, 2025

 function updateCounter(now){
    const msPerSecond = 1000, msPerMinute = 60000, msPerHour = 3600000, msPerDay = 86400000;
    const start = new Date(TOGETHER_SINCE.getFullYear(), TOGETHER_SINCE.getMonth(), TOGETHER_SINCE.getDate(), 0, 0, 0);

    // calendar-aware years/months (date-only comparison)
    let years = now.getFullYear() - start.getFullYear();
    let months = now.getMonth() - start.getMonth();
    if (now.getDate() < start.getDate()) months -= 1;
    if (months < 0) { years -= 1; months += 12; }
    years = Math.max(0, years);
    months = Math.max(0, months);

    // anchor = start date advanced by the full years + months already counted
    const anchor = new Date(start.getFullYear() + years, start.getMonth() + months, start.getDate(), 0, 0, 0);

    // whatever's left over, cascade into weeks, days, hours, minutes, seconds
    let remainderMs = Math.max(0, now - anchor);
    const weeks = Math.floor(remainderMs / (7 * msPerDay));
    remainderMs -= weeks * 7 * msPerDay;
    const days = Math.floor(remainderMs / msPerDay);
    remainderMs -= days * msPerDay;
    const hours = Math.floor(remainderMs / msPerHour);
    remainderMs -= hours * msPerHour;
    const minutes = Math.floor(remainderMs / msPerMinute);
    remainderMs -= minutes * msPerMinute;
    const seconds = Math.floor(remainderMs / msPerSecond);

    document.getElementById('countYears').textContent = years;
    document.getElementById('countMonths').textContent = months;
    document.getElementById('countWeeks').textContent = weeks;
    document.getElementById('countDays').textContent = days;
    document.getElementById('countHours').textContent = String(hours).padStart(2,'0');
    document.getElementById('countMinutes').textContent = String(minutes).padStart(2,'0');
    document.getElementById('countSeconds').textContent = String(seconds).padStart(2,'0');
  }

  function render(){
    const now = new Date();
    
    document.getElementById('weekday').textContent = WEEKDAYS[TOGETHER_SINCE.getDay()];
    document.getElementById('dayNumber').textContent = String(TOGETHER_SINCE.getDate()).padStart(2,'0');
    document.getElementById('monthYear').textContent = `${MONTHS[TOGETHER_SINCE.getMonth()]} ${TOGETHER_SINCE.getFullYear()}`;
    document.getElementById('footnote').textContent = NOTES[TOGETHER_SINCE.getDate() % NOTES.length];
    updateCounter(now);
  }
  render();
  // keep it correct across midnight without needing a reload
  setInterval(render, 60 * 1000);

  // gentle ambient hearts
  (function ambient(){
    const host = document.getElementById('ambient');
    const glyphs = ['♥','♡'];
    const count = window.matchMedia('(prefers-reduced-motion: reduce)').matches ? 0 : 10;
    for(let i=0;i<count;i++){
      const s = document.createElement('span');
      s.textContent = glyphs[i % 2];
      s.style.left = (Math.random()*100) + 'vw';
      s.style.fontSize = (10 + Math.random()*16) + 'px';
      s.style.animationDuration = (14 + Math.random()*14) + 's';
      s.style.animationDelay = (Math.random()*14) + 's';
      host.appendChild(s);
    }
  })();

  // register service worker for offline use
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('service-worker.js').catch(()=>{});
    });
  }

  // ---- Install button ----
  (function installFlow(){
    const btn = document.getElementById('installBtn');
    const btnLabel = document.getElementById('installBtnLabel');
    const sheetBackdrop = document.getElementById('installSheetBackdrop');
    const sheetTitle = document.getElementById('sheetTitle');
    const sheetBody = document.getElementById('sheetBody');
    const sheetClose = document.getElementById('installSheetClose');

    const isStandalone =
      window.matchMedia('(display-mode: standalone)').matches ||
      window.navigator.standalone === true; // iOS Safari flag

    if (isStandalone) {
      btn.classList.add('hidden');
      return; // already installed, nothing to offer
    }

    const ua = navigator.userAgent;
    const isIOS = /iphone|ipad|ipod/i.test(ua) ||
      (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1); // iPadOS
    const isAndroid = /android/i.test(ua);
    const isFirefox = /firefox/i.test(ua);
    const isSafariDesktop = !isIOS && /safari/i.test(ua) && !/chrome|chromium|edg/i.test(ua);

    let deferredPrompt = null;

    // Chrome / Edge / Android browsers that support native install prompts
    window.addEventListener('beforeinstallprompt', (e) => {
      e.preventDefault();
      deferredPrompt = e;
    });

    window.addEventListener('appinstalled', () => {
      btn.classList.add('hidden');
      deferredPrompt = null;
    });

    function shareIconHTML(){
      return `<span class="icon-inline"><svg viewBox="0 0 24 24" fill="none" stroke="#7C5C36" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M12 16V4"/><path d="M8 8l4-4 4 4"/><path d="M5 12v7a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2v-7"/></svg></span>`;
    }
    function menuIconHTML(){
      return `<span class="icon-inline"><svg viewBox="0 0 24 24" fill="none" stroke="#7C5C36" stroke-width="1.8" stroke-linecap="round"><circle cx="12" cy="5" r="1.4"/><circle cx="12" cy="12" r="1.4"/><circle cx="12" cy="19" r="1.4"/></svg></span>`;
    }

    function showSheet(){
      if (isIOS) {
        sheetTitle.textContent = 'Add to your home screen';
        sheetBody.innerHTML = `Tap the Share icon ${shareIconHTML()} in Safari's toolbar, then choose <strong>&ldquo;Add to Home Screen.&rdquo;</strong>`;
      } else if (isAndroid) {
        sheetTitle.textContent = 'Add to your home screen';
        sheetBody.innerHTML = `Open your browser's menu ${menuIconHTML()} and choose <strong>&ldquo;Install app&rdquo;</strong> or <strong>&ldquo;Add to Home screen.&rdquo;</strong>`;
      } else if (isFirefox) {
        sheetTitle.textContent = 'Keep it close by';
        sheetBody.innerHTML = `Firefox doesn't support installing this app just yet. Try opening this page in Chrome, Edge, or Safari to add it to your home screen.`;
      } else if (isSafariDesktop) {
        sheetTitle.textContent = 'Add to Dock';
        sheetBody.innerHTML = `Open the <strong>File</strong> menu and choose <strong>&ldquo;Add to Dock.&rdquo;</strong>`;
      } else {
        sheetTitle.textContent = 'Install this app';
        sheetBody.innerHTML = `Look for an install icon in your address bar, or open your browser's menu ${menuIconHTML()} and choose <strong>&ldquo;Install app.&rdquo;</strong>`;
      }
      sheetBackdrop.classList.add('visible');
    }

    btn.addEventListener('click', async () => {
      if (deferredPrompt) {
        deferredPrompt.prompt();
        const { outcome } = await deferredPrompt.userChoice;
        if (outcome === 'accepted') {
          btn.classList.add('hidden');
        }
        deferredPrompt = null;
        return;
      }
      showSheet();
    });

    sheetClose.addEventListener('click', () => {
      sheetBackdrop.classList.remove('visible');
    });
    sheetBackdrop.addEventListener('click', (e) => {
      if (e.target === sheetBackdrop) sheetBackdrop.classList.remove('visible');
    });
  })();
</script>
</body>
</html>
